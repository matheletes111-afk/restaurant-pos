<style>
/* Basic reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    overflow: hidden; /* Prevent scrolling while preloader is visible */
    background-color: #000; /* Initial black background */
    transition: background-color 0.5s ease; /* Smooth transition for background color */
}

/* Preloader styles */
#preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #000; /* Black background */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.loader {
    text-align: center;
}

.loader img {
    width: 250px; /* Adjust size as needed */
    margin-bottom: 20px;
}

.fade-out {
    opacity: 0; /* Target opacity */
    visibility: hidden; /* Hides the preloader after fade-out */
    transition: opacity 1s ease, visibility 1s ease; /* Smooth transition for fade-out */
}


/* Main content styles */
#content {
    display: none; /* Hide content initially */
}
    </style>
